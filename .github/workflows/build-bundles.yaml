name: Build Emulator Bundles

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: false
      wallets:
        description: 'Comma-separated list of wallets to build (e.g., trezor,bitbox02). Leave empty for all.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  BUNDLE_VERSION: ${{ github.event.inputs.version || github.ref_name || 'dev' }}

jobs:
  # ---------------------------------------------------------------------------
  # Trezor
  # ---------------------------------------------------------------------------
  build-trezor:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'trezor') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: trezor/trezor-firmware
          path: trezor-firmware
          submodules: recursive
          ref: core/v2.8.9
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip python3-venv python-is-python3 \
            libsdl2-dev libsdl2-image-dev protobuf-compiler libprotobuf-dev libusb-1.0-0-dev libclang-dev \
            scons build-essential pkg-config libffi-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to a nightly compatible with core/v2.8.9
          toolchain: nightly-2025-06-01
          components: rust-src
      - name: Build and package
        run: FIRMWARE_DIR=trezor-firmware ./scripts/build/trezor.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-trezor-linux-x86_64
          path: hwwtui-trezor-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # BitBox02
  # ---------------------------------------------------------------------------
  build-bitbox02:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'bitbox02') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: BitBoxSwiss/bitbox02-firmware
          path: bitbox02-firmware
          submodules: recursive
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++ protobuf-compiler \
            libusb-1.0-0-dev libudev-dev pkg-config \
            python3 python3-pip libcmocka-dev libhidapi-dev libprotobuf-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust tools (cbindgen, prost-build-proto, rust-src)
        run: |
          # BitBox02 pins to a specific Rust version via rust-toolchain.toml
          BB_TOOLCHAIN=$(grep 'channel' bitbox02-firmware/src/rust/rust-toolchain.toml | cut -d'"' -f2)
          rustup toolchain install "${BB_TOOLCHAIN}"
          rustup component add rust-src --toolchain "${BB_TOOLCHAIN}-x86_64-unknown-linux-gnu"
          cargo install cbindgen bindgen-cli
          cd bitbox02-firmware/tools/prost-build-proto && cargo build --release
          cp target/release/prost-build-proto ~/.cargo/bin/
      - name: Build and package
        run: FIRMWARE_DIR=bitbox02-firmware ./scripts/build/bitbox02.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-bitbox02-linux-x86_64
          path: hwwtui-bitbox02-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Coldcard
  # ---------------------------------------------------------------------------
  build-coldcard:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'coldcard') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Coldcard/firmware
          path: coldcard-firmware
          submodules: recursive
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-dev python3-pip python3-venv \
            libffi-dev build-essential pkg-config \
            autoconf automake libtool
      - name: Build and package
        run: FIRMWARE_DIR=coldcard-firmware ./scripts/build/coldcard.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-coldcard-linux-x86_64
          path: hwwtui-coldcard-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Specter DIY
  # ---------------------------------------------------------------------------
  build-specter:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'specter') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: cryptoadvance/specter-diy
          path: specter-diy
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip libsdl2-dev \
            gcc-arm-none-eabi build-essential \
            pkg-config libtool autoconf automake
      - name: Build and package
        run: FIRMWARE_DIR=specter-diy ./scripts/build/specter.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-specter-linux-x86_64
          path: hwwtui-specter-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Ledger (requires Docker)
  # ---------------------------------------------------------------------------
  build-ledger:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'ledger') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: LedgerHQ/app-bitcoin-new
          path: app-bitcoin-new
          submodules: recursive
      - name: Build and package
        run: FIRMWARE_DIR=app-bitcoin-new ./scripts/build/ledger.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-ledger-linux-x86_64
          path: hwwtui-ledger-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Jade (requires Docker, heaviest build)
  # ---------------------------------------------------------------------------
  build-jade:
    if: ${{ inputs.wallets == '' || contains(inputs.wallets, 'jade') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Blockstream/Jade
          path: jade-firmware
          submodules: recursive
      - name: Build and package
        run: FIRMWARE_DIR=jade-firmware ./scripts/build/jade.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hwwtui-jade-linux-x86_64
          path: hwwtui-jade-linux-x86_64.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Release
  # ---------------------------------------------------------------------------
  release:
    needs:
      - build-trezor
      - build-bitbox02
      - build-coldcard
      - build-specter
      - build-ledger
      - build-jade
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect tarballs
        run: |
          mkdir -p release-assets
          find artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUNDLE_VERSION }}
          name: "hwwtui ${{ env.BUNDLE_VERSION }}"
          body: |
            Emulator firmware bundles for hwwtui ${{ env.BUNDLE_VERSION }}.

            Each tarball contains the emulator binary, required runtime data, and a
            `bundle-info.json` manifest.

            | Wallet | Asset |
            |--------|-------|
            | Trezor | `hwwtui-trezor-linux-x86_64.tar.gz` |
            | BitBox02 | `hwwtui-bitbox02-linux-x86_64.tar.gz` |
            | Coldcard | `hwwtui-coldcard-linux-x86_64.tar.gz` |
            | Specter | `hwwtui-specter-linux-x86_64.tar.gz` |
            | Ledger | `hwwtui-ledger-linux-x86_64.tar.gz` (requires Docker) |
            | Jade | `hwwtui-jade-linux-x86_64.tar.gz` (requires Docker) |
          draft: false
          prerelease: false
          files: release-assets/*.tar.gz
          generate_release_notes: true
